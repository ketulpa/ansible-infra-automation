- name: Linux Server Hardening
  hosts: linux
  become: true
  tasks:

    - name: Update all packages
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

    - name: Set timezone to UTC
      community.general.timezone:
        name: UTC

    - name: Install common tools
      ansible.builtin.apt:
        name: [htop, curl, git, net-tools, unzip, fail2ban]
        state: present

    - name: Enable UFW and allow ports
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: ["22", "80", "443", "3000", "9090", "9093", "9100", "5000"]

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Disable SSH password authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH

    - name: Configure fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: true

  handlers:
    - name: Restart SSH
      ansible.builtin.service:
        name: sshd
        state: restarted
